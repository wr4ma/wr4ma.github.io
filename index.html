<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Elegan -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

    <style>
        /* Font Custom */
        .font-heading { font-family: 'Playfair Display', serif; }
        .font-body { font-family: 'Lora', serif; }

        body {
            margin: 0;
            overflow: hidden; 
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #172554);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #f3f4f6;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ==========================================
           1. LAPISAN LATAR BELAKANG
           ========================================== */
        #slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background-color: #000;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            transform: scale(1);
        }

        .slide.active {
            opacity: 1;
            transform: scale(1.05);
            transition: opacity 2s ease-in-out, transform 10s linear;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.9));
            z-index: 2; 
        }

        #sparkles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 3; 
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px #d4af37, 0 0 12px #d4af37;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* ==========================================
           2. ANIMASI AMPLOP & BERUANG
           ========================================== */
        #envelope-screen {
            position: fixed;
            inset: 0;
            z-index: 50; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }

        .env-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            cursor: pointer;
            perspective: 1200px;
            z-index: 10;
        }
        
        #animated-envelope { transition: transform 0.3s ease; }
        #animated-envelope:hover { transform: translateY(-5px) scale(1.02); }

        @keyframes waveBear {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(35deg); }
        }
        .animate-bear-wave {
            animation: waveBear 1.5s ease-in-out infinite;
            transform-origin: 170px 90px;
        }

        @keyframes floatBubble {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-bubble { animation: floatBubble 2s ease-in-out infinite; }

        #polkadot-pattern circle { fill: #fff; }
        .polkadot-fill { fill: url(#polkadot-pattern); }
        .polkadot-stroke { stroke: url(#polkadot-pattern); }

        .env-letter {
            position: absolute;
            left: 5%;
            right: 5%;
            bottom: 5px;
            height: 90%;
            background: linear-gradient(to bottom, #fffbeb, #fef3c7);
            border-radius: 8px 8px 0 0;
            box-shadow: 0 0 15px rgba(0,0,0,0.4) inset;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 30px;
            z-index: 2;
            transition: transform 0.8s ease-in-out 0.2s;
            border: 1px solid #d4af37;
        }

        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 140px;
            z-index: 4;
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
        }

        .env-seal {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #facc15, #a16207);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            border: 2px solid #fef08a;
            color: #451a03;
            font-size: 1.5rem;
            transition: opacity 0.4s ease;
        }

        .env-wrapper.open .env-flap { transform: rotateX(180deg); z-index: 1; }
        .env-wrapper.open .env-seal { opacity: 0; }
        .env-wrapper.open .env-letter { transform: translateY(-80px); z-index: 3; }
        .env-wrapper.open .hide-on-open { transform: translateY(50px); opacity: 0; transition: all 0.5s ease; }

        /* ==========================================
           3. PANEL KONTEN UTAMA & ANIMASI SHRINK
           ========================================== */
        #main-content { z-index: 10; }
        
        .glass-panel {
            z-index: 20; 
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .text-shadow-custom {
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9), 0px 0px 10px rgba(0,0,0,0.6);
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #fff;
            vertical-align: middle;
            margin-left: 4px;
            animation: blink 0.8s infinite;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.8); }

        #greeting, #text-scroll-container { transition: opacity 1s ease-in-out; }
        
        /* ==========================================
           4. EFEK ANIMASI KHUSUS TEKS ENDING
           ========================================== */
        @keyframes fadeInUpScale {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes goldenGlow {
            0% { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4), 0 0 20px rgba(212, 175, 55, 0.2); transform: scale(1); }
            100% { text-shadow: 0 0 15px rgba(212, 175, 55, 0.9), 0 0 30px rgba(212, 175, 55, 0.6); transform: scale(1.05); }
        }

        .animate-final-text {
            opacity: 0; 
            animation: fadeInUpScale 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .animate-glow {
            display: inline-block;
            animation: goldenGlow 2s infinite alternate ease-in-out;
        }

        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.5);
            backdrop-filter: blur(5px);
            color: #d4af37;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .music-btn:hover {
            transform: scale(1.1);
            background: rgba(15, 23, 42, 0.8);
        }
        .spin-slow {
            animation: spin 4s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        let isMusicPlaying = false;

        function playMusic() {
            const music = document.getElementById('bgMusic');
            music.volume = 0.8;
            
            let playPromise = music.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    isMusicPlaying = true;
                    document.getElementById('music-icon').classList.add('spin-slow');
                    const musicBtn = document.getElementById('music-toggle');
                    musicBtn.classList.remove('hidden', 'opacity-0');
                }).catch(error => {
                    console.log("Audio ditahan browser, butuh interaksi manual:", error);
                    const musicBtn = document.getElementById('music-toggle');
                    musicBtn.classList.remove('hidden', 'opacity-0');
                    musicBtn.classList.add('animate-bounce'); 
                });
            }
        }

        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const musicBtn = document.getElementById('music-toggle');
            
            if (isMusicPlaying) {
                music.pause();
                isMusicPlaying = false;
                document.getElementById('music-icon').classList.remove('spin-slow');
                musicBtn.classList.remove('animate-bounce'); 
            } else {
                music.play();
                isMusicPlaying = true;
                document.getElementById('music-icon').classList.add('spin-slow');
                musicBtn.classList.remove('animate-bounce'); 
            }
        }

        function openEnvelope() {
            const wrapper = document.getElementById('animated-envelope');
            const envScreen = document.getElementById('envelope-screen');
            const mainContent = document.getElementById('main-content');
            const slideContainer = document.getElementById('slideshow-container');
            const overlay = document.getElementById('overlay');

            if (wrapper.classList.contains('open')) return;
            wrapper.classList.add('open');
            
            // PANGGIL MUSIK
            playMusic();

            setTimeout(() => {
                envScreen.style.transform = 'scale(1.2)';
                envScreen.style.opacity = '0';
                
                setTimeout(() => {
                    envScreen.style.display = 'none';
                    
                    mainContent.classList.remove('hidden');
                    slideContainer.classList.remove('hidden');
                    overlay.classList.remove('hidden');
                    
                    void mainContent.offsetWidth; 
                    
                    mainContent.classList.remove('opacity-0');
                    slideContainer.classList.remove('opacity-0');
                    overlay.classList.remove('opacity-0');
                    
                    initSlideshow(); 
                    
                    setTimeout(() => {
                        document.getElementById('greeting').classList.remove('opacity-0');
                        setTimeout(typeWriter, 1000);
                    }, 1200);

                }, 1000); 
            }, 1800); 
        }

        const slideDuration = 4500; 
        const slideshowContainer = document.getElementById('slideshow-container');
        let currentSlide = 0;
        let slides = [];

        function initSlideshow() {
            if(slides.length > 0) return;
            imageUrls.forEach((url) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.style.backgroundImage = `url('${url}')`;
                slideshowContainer.appendChild(slide);
                slides.push(slide);
            });
            if(slides.length > 0) {
                setTimeout(() => { slides[0].classList.add('active'); }, 100);
            }
            setInterval(nextSlide, slideDuration);
        }

        function nextSlide() {
            if(slides.length === 0) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        const kecepatanMengetik = 75; 
        const textElement = document.getElementById('typing-text');
        const scrollContainer = document.getElementById('text-scroll-container');
        let index = 0;

        function typeWriter() {
            if (index < pesanArray.length) {
                if (pesanArray[index] === '\n') {
                    textElement.innerHTML += '<br>'; 
                } else {
                    textElement.innerHTML += pesanArray[index];
                }
                index++;
                scrollContainer.scrollTop = scrollContainer.scrollHeight;
                setTimeout(typeWriter, kecepatanMengetik);
            } else {
                // TUNGGU TEPAT 3 DETIK (3000 ms)
                setTimeout(triggerFinalAnimation, 3000);
            }
        }

        function triggerFinalAnimation() {
            const mainPanel = document.getElementById('main-panel');
            const greeting = document.getElementById('greeting');
            const scroller = document.getElementById('text-scroll-container');
            const finalMessage = document.getElementById('final-message');
            
            const p1 = document.getElementById('final-p1');
            const p2 = document.getElementById('final-p2');
            const name = document.getElementById('final-name');

            greeting.style.opacity = '0';
            scroller.style.opacity = '0';

            setTimeout(() => {
                greeting.style.display = 'none';
                scroller.style.display = 'none';

                mainPanel.classList.remove('max-w-2xl', 'md:p-10', 'p-6');
                mainPanel.classList.add('max-w-xl', 'p-8', 'md:p-12');

                finalMessage.style.display = 'block';
                
                setTimeout(() => { p1.classList.add('animate-final-text'); }, 200);   
                setTimeout(() => { p2.classList.add('animate-final-text'); }, 1200);  
                setTimeout(() => { name.classList.add('animate-final-text'); }, 2200); 

            }, 1000); 
        }

        window.onload = () => {
            createSparkles(); 
            runIntroAnimations(); 
        };
    </script>
</body>
</html>
